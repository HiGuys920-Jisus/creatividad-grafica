<footer class="footer-main">
  <div class="container">
    <div class="footer-grid">
      
      <div class="contact-details">
        <h2 class="title">Profesionales en servicios gráficos.</h2>
        <p class="subtitle">Contáctanos para más información.</p>

        <div class="contact-item">
          <div class="icon-circle">
            <i class="whatsapp-icon"></i> </div>
          <div class="text">
            <span class="phone">959 016 469</span>
          </div>
        </div>

        <div class="contact-item">
          <i class="loc-icon"></i>
          <p>Av. Los Heroes Nº 565<br>Int. 12 Urb. Ciudad de Dios S.J.M.</p>
        </div>

        <div class="contact-item">
          <i class="mail-icon"></i>
          <p>aguirrechiroquer&#64;gmail.com</p>
        </div>

<div class="map-container">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3900.247477610191!2d-76.9749557!3d-12.1633512!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105b8686d13d72b%3A0x62959632f056461b!2sAv.%20los%20Heroes%20565%2C%20San%20Juan%20de%20Miraflores%2015801!5e0!3m2!1ses!2spe!4v1709680000000!5m2!1ses!2spe" 
          width="100%" 
          height="250" 
          style="border:0;" 
          allowfullscreen="" 
          loading="lazy" 
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>

      <div class="form-card">
        <form (submit)="enviarMensaje($event)" #contactForm="ngForm">
          <div class="field">
            <label>Nombre</label>
            <input 
              type="text" 
              name="nombre" 
              [(ngModel)]="formData.nombre" 
              placeholder="Escribe tu nombre completo" 
              required>
          </div>

          <div class="field">
            <label>Correo Electrónico</label>
            <input 
              type="email" 
              name="email" 
              [(ngModel)]="formData.email" 
              placeholder="ejemplo@correo.com" 
              required>
          </div>

          <div class="field">
            <label>Mensaje</label>
            <textarea 
              name="mensaje" 
              [(ngModel)]="formData.mensaje" 
              rows="4" 
              placeholder="¿En qué podemos ayudarte?" 
              required></textarea>
          </div>

          <button type="submit" [disabled]="loading || !contactForm.valid" class="btn-submit">
            <span *ngIf="!loading">ENVIAR MENSAJE</span>
            <span *ngIf="loading" class="spinner">Enviando...</span>
          </button>
        </form>
      </div>

    </div>
  </div>
</footer>
